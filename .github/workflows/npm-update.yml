name: npm-update

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Update npm dependencies
        run: npm update

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update npm dependencies"
          branch: chore/npm-update
          delete-branch: true
          title: "chore: update npm dependencies"
          body: |
            Automated dependency update generated after a push to `main`.

            This PR was created by the `npm-update` workflow after running `npm update`.
          labels: |
            dependencies
